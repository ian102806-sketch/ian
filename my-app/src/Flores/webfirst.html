<p style = "font-size:10px> Coraline is a 2009 American stop-motion animated dark fantasy horror film written and directed by Henry Selick, based on the 2002 novella by Neil Gaiman. The first feature film produced by Laika studios, it features the voices of Dakota Fanning, Teri Hatcher, Jennifer Saunders, Dawn French, and Ian McShane. The film tells the story of a young girl discovering an idealized alternate universe behind a secret door in her new home, unaware that it contains something dark and sinister. </p>
